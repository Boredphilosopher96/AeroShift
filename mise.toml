min_version = "2026.4.18"

[settings]
experimental = true
ruby.compile = false

[tools]
ruby = "3.4"
swift = "6.3"
swiftlint = "0.63.2"
swiftformat = "0.60.1"
xcodegen = "2.45.3"
periphery = "3.7.2"
xcbeautify = "3.2.1"
"pipx:antlr4-tools" = "0.2.2"
"github:adaszko/complgen" = { version = "0.9.0", bin = "complgen" }
"github:cli/cli" = { version = "2.91.0", bin = "gh" }
"github:google/osv-scanner" = { version = "2.3.5", bin = "osv-scanner" }
"github:rhysd/actionlint" = { version = "1.7.12", bin = "actionlint" }
"aqua:fish-shell/fish-shell" = { version = "4.6.0", symlink_bins = true }

[tasks.doctor]
description = "Print the active repo toolchain"
run = """
set -euo pipefail
xcodebuild -version
swift --version
ruby -v
bundle --version
swiftformat --version
swiftlint version
xcodegen --version
if sw_vers -productVersion | grep -q "^14"; then
  echo 'warning: periphery version is skipped on macOS 14'
else
  periphery version
fi
if command -v complgen >/dev/null 2>&1; then
  complgen --version
elif command -v complgen-aarch64-apple >/dev/null 2>&1; then
  complgen-aarch64-apple --version
else
  complgen-x86_64-apple --version
fi
fish --version
"""

[tasks.workflow-lint]
description = "Lint GitHub Actions workflows"
run = "actionlint .github/workflows/*.yml"

[tasks.close-third-party-issues]
hide = true
description = "Close issues that are opened directly on the fork"
run = """
set -euo pipefail
if [ -z "${ISSUE:-}" ]; then
  echo "ISSUE is required" >&2
  exit 1
fi
author="$(gh issue view "$ISSUE" --json author --jq '.author.login')"
if [ "$author" = "Boredphilosopher96" ]; then
  exit 0
fi
gh issue edit "$ISSUE" --add-label bin
gh issue close "$ISSUE" --comment "Please don't open issues directly on this fork. Use GitHub Discussions instead: https://github.com/Boredphilosopher96/Aeroshift/discussions . This repository is an unofficial Aeroshift fork of AeroSpace."
gh issue lock "$ISSUE"
"""

[tasks.gha-select-xcode]
hide = true
description = "Select the expected Xcode version on GitHub-hosted macOS runners"
run = "bash ./.github/gh-actions-runner-xcode-select.sh"

[tasks.bundle-install]
hide = true
description = "Install Ruby gem dependencies"
run = "bundle install"

[tasks.setup]
description = "Install repo dependencies and generate project files"
depends = ["bundle-install"]
run = "./generate.sh"

[tasks.build]
description = "Build the debug binaries"
run = "./build-debug.sh"

[tasks.test]
description = "Run the repo test suite"
run = "./test.sh"

[tasks.ci-quality]
description = "Run the repo-quality CI lane"
depends = ["workflow-lint"]
run = "./test.sh"

[tasks.ci-compat]
description = "Run the compatibility build/test lane"
run = """
set -euo pipefail
./build-debug.sh -Xswiftc -warnings-as-errors
./swift-test.sh
./.debug/aeroshift --help > /dev/null
./.debug/aeroshift --version > /dev/null
"""

[tasks.security]
description = "Run dependency security checks"
depends = ["bundle-install"]
run = """
set -euo pipefail
tmp_dir="$(mktemp -d /private/tmp/aeroshift-security.XXXXXX)"
cleanup() {
  rm -rf "$tmp_dir"
}
trap cleanup EXIT
cp Gemfile "$tmp_dir/Gemfile"
bundle lock --gemfile "$tmp_dir/Gemfile" --lockfile "$tmp_dir/Gemfile.lock"
osv-scanner scan source -L "$tmp_dir/Gemfile.lock"
"""

[tasks.docs]
description = "Build the website and man pages"
depends = ["bundle-install"]
run = "./build-docs.sh"

[tasks.format]
description = "Format the codebase"
run = "./format.sh"

[tasks.lint]
description = "Run repo linters"
run = "./lint.sh"

[tasks.completions]
description = "Build shell completion artifacts"
run = "./build-shell-completion.sh"

[tasks.release]
description = "Build release artifacts"
depends = ["bundle-install"]
run = "./build-release.sh"

[tasks.release-ci]
description = "Build release artifacts and verify the source-install path in CI"
depends = ["bundle-install"]
run = """
set -euo pipefail
if [ -n "${AEROSHIFT_BUILD_VERSION:-}" ]; then
  ./build-release.sh --build-version "$AEROSHIFT_BUILD_VERSION" --codesign-identity -
else
  ./build-release.sh --codesign-identity -
fi
./install-from-sources.sh --dont-rebuild
"""

[tasks.release-next-version]
description = "Compute the next release version"
run = """
set -euo pipefail
bump_type="${RELEASE_TYPE:-patch}"
bash ./script/next-release-version.sh "$bump_type"
"""

[tasks.release-bundle-metadata]
description = "Compute the release workflow metadata"
run = """
set -euo pipefail
commit_sha="$(git rev-parse HEAD)"
bump_type="${RELEASE_TYPE:-patch}"
if test "${GITHUB_EVENT_NAME:-}" != "workflow_dispatch"; then
  bump_type=patch
fi
build_version="$(RELEASE_TYPE="$bump_type" mise run release-next-version)"
release_tag="v${build_version}"
release_zip_name="Aeroshift-v${build_version}.zip"
github_server_url="${GITHUB_SERVER_URL:-https://github.com}"
github_repository="${GITHUB_REPOSITORY:-Boredphilosopher96/Aeroshift}"
artifact_name="release-bundles-${build_version}"
release_page_url="${github_server_url}/${github_repository}/releases/tag/${release_tag}"
release_zip_url="${github_server_url}/${github_repository}/releases/download/${release_tag}/${release_zip_name}"

if [ -n "${GITHUB_OUTPUT:-}" ]; then
  output_target="$GITHUB_OUTPUT"
else
  output_target=/dev/stdout
fi

{
  printf 'artifact_name=%s\n' "$artifact_name"
  printf 'build_version=%s\n' "$build_version"
  printf 'commit_sha=%s\n' "$commit_sha"
  printf 'is_release=true\n'
  printf 'release_page_url=%s\n' "$release_page_url"
  printf 'release_tag=%s\n' "$release_tag"
  printf 'release_zip_name=%s\n' "$release_zip_name"
  printf 'release_zip_url=%s\n' "$release_zip_url"
} >> "$output_target"
"""

[tasks.release-casks-github-url]
description = "Regenerate release casks to point at GitHub release assets"
run = """
set -euo pipefail
if [ -z "${AEROSHIFT_BUILD_VERSION:-}" ]; then
  echo "AEROSHIFT_BUILD_VERSION is required" >&2
  exit 1
fi
if [ -z "${AEROSHIFT_RELEASE_ZIP_URI:-}" ]; then
  echo "AEROSHIFT_RELEASE_ZIP_URI is required" >&2
  exit 1
fi
zip_sha_source="${AEROSHIFT_RELEASE_ZIP_SHA_SOURCE:-.release/Aeroshift-v${AEROSHIFT_BUILD_VERSION}.zip}"
./script/build-brew-cask.sh --cask-name aeroshift --zip-uri "$AEROSHIFT_RELEASE_ZIP_URI" --zip-sha-source "$zip_sha_source" --build-version "$AEROSHIFT_BUILD_VERSION"
./script/build-brew-cask.sh --cask-name aeroshift-dev --zip-uri "$AEROSHIFT_RELEASE_ZIP_URI" --zip-sha-source "$zip_sha_source" --build-version "$AEROSHIFT_BUILD_VERSION"
"""

[tasks.release-publish]
description = "Create or update the GitHub release and upload release assets"
run = """
set -euo pipefail
if [ -z "${AEROSHIFT_RELEASE_TAG:-}" ]; then
  echo "AEROSHIFT_RELEASE_TAG is required" >&2
  exit 1
fi
if [ -z "${AEROSHIFT_RELEASE_TARGET:-}" ]; then
  echo "AEROSHIFT_RELEASE_TARGET is required" >&2
  exit 1
fi
if [ -z "${AEROSHIFT_RELEASE_ASSETS:-}" ]; then
  echo "AEROSHIFT_RELEASE_ASSETS is required" >&2
  exit 1
fi

release_title="${AEROSHIFT_RELEASE_TITLE:-$AEROSHIFT_RELEASE_TAG}"
workflow_run_url="unavailable"
if [ -n "${GITHUB_SERVER_URL:-}" ] && [ -n "${GITHUB_REPOSITORY:-}" ] && [ -n "${GITHUB_RUN_ID:-}" ]; then
  workflow_run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
fi
release_notes="${AEROSHIFT_RELEASE_NOTES:-Automated release bundle for main.

Commit: ${AEROSHIFT_RELEASE_TARGET}
Workflow run: ${workflow_run_url}}"

assets=()
while IFS= read -r asset; do
  if [ -z "$asset" ]; then
    continue
  fi
  if ! test -f "$asset"; then
    echo "Missing release asset: $asset" >&2
    exit 1
  fi
  assets+=("$asset")
done <<EOF
${AEROSHIFT_RELEASE_ASSETS}
EOF

if [ "${AEROSHIFT_RELEASE_DRY_RUN:-0}" = "1" ]; then
  printf 'release_tag=%s\n' "$AEROSHIFT_RELEASE_TAG"
  printf 'release_target=%s\n' "$AEROSHIFT_RELEASE_TARGET"
  printf 'release_title=%s\n' "$release_title"
  printf 'release_notes=%s\n' "$release_notes"
  printf 'asset=%s\n' "${assets[@]}"
  exit 0
fi

if gh release view "$AEROSHIFT_RELEASE_TAG" > /dev/null 2>&1; then
  gh release upload "$AEROSHIFT_RELEASE_TAG" "${assets[@]}" --clobber
else
  gh release create "$AEROSHIFT_RELEASE_TAG" "${assets[@]}" \
    --target "$AEROSHIFT_RELEASE_TARGET" \
    --title "$release_title" \
    --notes "$release_notes"
fi
"""

[tasks.release-publish-homebrew-tap]
description = "Publish generated Homebrew casks to the Homebrew tap repository"
run = """
set -euo pipefail

tap_repo="${AEROSHIFT_HOMEBREW_TAP_REPO:-Boredphilosopher96/homebrew-aeroshift}"
tap_branch="${AEROSHIFT_HOMEBREW_TAP_BRANCH:-main}"
default_cask_files=".release/aeroshift.rb"
cask_files="${AEROSHIFT_HOMEBREW_TAP_CASK_FILES:-$default_cask_files}"
commit_message="${AEROSHIFT_HOMEBREW_TAP_COMMIT_MESSAGE:-Update Homebrew casks for ${AEROSHIFT_RELEASE_TAG:-${AEROSHIFT_BUILD_VERSION:-release}}}"
dry_run="${AEROSHIFT_HOMEBREW_TAP_DRY_RUN:-0}"

if [ "$dry_run" != "1" ] && [ -z "${GH_TOKEN:-}" ]; then
  echo "GH_TOKEN is required to publish Homebrew tap casks" >&2
  exit 1
fi

cleanup_files=()
cleanup() {
  rm -f "${cleanup_files[@]}" 2>/dev/null || true
}
trap cleanup EXIT

while IFS= read -r cask_file; do
  if [ -z "$cask_file" ]; then
    continue
  fi
  if ! test -f "$cask_file"; then
    echo "Missing Homebrew tap cask asset: $cask_file" >&2
    exit 1
  fi

  cask_file_name="$(basename "$cask_file")"
  repo_path="Casks/$cask_file_name"
  desired_content="$(cat "$cask_file")"
  existing_error_file="$(mktemp /private/tmp/aeroshift-tap-error.XXXXXX)"
  cleanup_files+=("$existing_error_file")
  existing_content=''
  existing_sha=''

  if existing_json="$(gh api "repos/$tap_repo/contents/$repo_path?ref=$tap_branch" 2> "$existing_error_file")"; then
    existing_sha="$(printf '%s' "$existing_json" | ruby -rjson -e 'data = JSON.parse(STDIN.read); print data.fetch("sha", "")')"
    existing_content="$(printf '%s' "$existing_json" | ruby -rjson -e 'data = JSON.parse(STDIN.read); print data.fetch("content", "").delete("\n").unpack1("m0")')"
  else
    if ! grep -q 'HTTP 404' "$existing_error_file"; then
      cat "$existing_error_file" >&2
      exit 1
    fi
  fi

  if [ "$existing_content" = "$desired_content" ]; then
    echo "Homebrew tap already up to date for $repo_path"
    continue
  fi

  if [ "$dry_run" = "1" ]; then
    printf 'tap_repo=%s\n' "$tap_repo"
    printf 'tap_branch=%s\n' "$tap_branch"
    printf 'tap_path=%s\n' "$repo_path"
    printf 'tap_commit_message=%s\n' "$commit_message"
    printf 'tap_existing_sha=%s\n' "$existing_sha"
    continue
  fi

  content_base64="$(ruby -e 'print [File.binread(ARGV[0])].pack("m0")' "$cask_file")"
  api_args=(
    --method PUT
    "repos/$tap_repo/contents/$repo_path"
    -f message="$commit_message"
    -f content="$content_base64"
    -f branch="$tap_branch"
  )
  if [ -n "$existing_sha" ]; then
    api_args+=(-f sha="$existing_sha")
  fi
  gh api "${api_args[@]}" > /dev/null
  echo "Published $repo_path to $tap_repo@$tap_branch"
done <<EOF
${cask_files}
EOF
"""
