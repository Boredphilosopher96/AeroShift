name: release-bundles

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_type:
        description: Semver bump to publish from the latest release tag
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release-bundles-main
  cancel-in-progress: false

jobs:
  build-release-bundles:
    name: build-release-bundles
    runs-on: macos-15
    outputs:
      artifact_name: ${{ steps.bundle-version.outputs.artifact_name }}
      build_version: ${{ steps.bundle-version.outputs.build_version }}
      commit_sha: ${{ steps.bundle-version.outputs.commit_sha }}
      is_release: ${{ steps.bundle-version.outputs.is_release }}
      release_page_url: ${{ steps.bundle-version.outputs.release_page_url }}
      release_tag: ${{ steps.bundle-version.outputs.release_tag }}
      release_zip_name: ${{ steps.bundle-version.outputs.release_zip_name }}
      release_zip_url: ${{ steps.bundle-version.outputs.release_zip_url }}
    permissions:
      contents: read
    steps:
      - run: env # Debug
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.sha }}
          fetch-depth: 0
      - run: ./.github/gh-actions-runner-xcode-select.sh
      - uses: jdx/mise-action@v4
        with:
          version: 2026.4.18
          install: true
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - run: mise run doctor
      - id: bundle-version
        name: Compute bundle version
        env:
          RELEASE_TYPE: ${{ inputs.release_type }}
        run: |
          set -euo pipefail
          commit_sha="$(git rev-parse HEAD)"
          short_sha="$(printf '%s' "$commit_sha" | cut -c1-7)"
          if test "$GITHUB_EVENT_NAME" = "workflow_dispatch"; then
            build_version="$(bash ./script/next-release-version.sh "$RELEASE_TYPE")"
            is_release=true
            release_tag="v${build_version}"
            release_page_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${release_tag}"
            release_zip_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${release_tag}/Aeroshift-v${build_version}.zip"
          else
            build_version="0.0.0-main.${GITHUB_RUN_NUMBER}-${short_sha}-SNAPSHOT"
            is_release=false
            release_tag=""
            release_page_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            release_zip_url=""
          fi
          release_zip_name="Aeroshift-v${build_version}.zip"
          echo "artifact_name=release-bundles-${build_version}" >> "$GITHUB_OUTPUT"
          echo "build_version=${build_version}" >> "$GITHUB_OUTPUT"
          echo "commit_sha=${commit_sha}" >> "$GITHUB_OUTPUT"
          echo "is_release=${is_release}" >> "$GITHUB_OUTPUT"
          echo "release_page_url=${release_page_url}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "release_zip_name=${release_zip_name}" >> "$GITHUB_OUTPUT"
          echo "release_zip_url=${release_zip_url}" >> "$GITHUB_OUTPUT"
      - name: mise run release-ci
        env:
          AEROSHIFT_BUILD_VERSION: ${{ steps.bundle-version.outputs.build_version }}
          AEROSHIFT_RELEASE_ZIP_URI: ${{ steps.bundle-version.outputs.release_zip_url }}
        run: mise run release-ci
      - name: Upload xcodebuild log
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log-${{ steps.bundle-version.outputs.build_version }}
          path: .release/xcodebuild.log
          if-no-files-found: ignore
          retention-days: 14
      - name: Upload release bundle artifacts
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.bundle-version.outputs.artifact_name }}
          path: |
            .release/${{ steps.bundle-version.outputs.release_zip_name }}
            .release/aeroshift.rb
            .release/aeroshift-dev.rb
          if-no-files-found: error
          retention-days: 14
  publish-release-bundles:
    name: publish-release-bundles
    runs-on: ubuntu-latest
    needs: build-release-bundles
    if: ${{ needs.build-release-bundles.result == 'success' && needs.build-release-bundles.outputs.is_release == 'true' }}
    # Configure required reviewers for the "release-bundles" environment in
    # repository settings to require a human approval before publication.
    environment:
      name: release-bundles
      url: ${{ needs.build-release-bundles.outputs.release_page_url }}
    permissions:
      contents: write
    steps:
      - name: Download release bundle artifacts
        uses: actions/download-artifact@v5
        with:
          name: ${{ needs.build-release-bundles.outputs.artifact_name }}
          path: .release
      - name: Publish GitHub release
        env:
          COMMIT_SHA: ${{ needs.build-release-bundles.outputs.commit_sha }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.build-release-bundles.outputs.release_tag }}
          RELEASE_ZIP_NAME: ${{ needs.build-release-bundles.outputs.release_zip_name }}
        run: |
          set -euo pipefail
          assets=(
            ".release/${RELEASE_ZIP_NAME}"
            ".release/aeroshift.rb"
            ".release/aeroshift-dev.rb"
          )
          if gh release view "$RELEASE_TAG" > /dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --target "$COMMIT_SHA" \
              --title "$RELEASE_TAG" \
              --notes "Automated release bundle for main.

Commit: $COMMIT_SHA
Workflow run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          fi
